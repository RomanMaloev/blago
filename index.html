<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>blago-agent web</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>blago-agent</h1>
      <p class="intro">Веб-интерфейс для взаимодействия с ИИ-агентом и сетью.</p>

      <section class="panel">
        <label for="network-url" class="label">URL для контекста из сети (опционально)</label>
        <input id="network-url" type="url" placeholder="https://example.com" />

        <label for="need-input" class="label">Сообщение агенту</label>
        <textarea id="need-input" rows="4" placeholder="Например: собери краткий план помощи волонтёрской группе"></textarea>

        <button id="analyze-button" type="button">Отправить агенту</button>
      </section>

      <section class="result" aria-live="polite">
        <h2>Диалог</h2>
        <div id="chat-log" class="chat-log"></div>
      </section>

      <section class="result" aria-live="polite">
        <h2>Технический ответ</h2>
        <pre id="result-output">Ожидание запроса…</pre>
      </section>
    </main>

    <script src="index.js"></script>
    <script src="app.js"></script>
  </body>
</html>
